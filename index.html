            color: white;
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #gameContainer {
            text-align: center;
            padding: 10px;
            max-width: 500px;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 {
            margin: 5px 0 10px;
            font-size: 22px;
            text-shadow: 0 0 15px cyan;
            letter-spacing: 2px;
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 8px 12px;
            background: rgba(0, 255, 255, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .score-box, .difficulty-box {
            font-size: 18px;
            font-weight: bold;
        }

        .score-box span, .difficulty-box span {
            color: cyan;
            margin-left: 5px;
        }

        canvas {
            background: #020617;
            border: 3px solid cyan;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 400px;
            height: auto;
            aspect-ratio: 1/1;
            animation: pulse 3s infinite alternate;
            touch-action: none;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); }
            100% { box-shadow: 0 0 35px rgba(0, 255, 255, 0.8); }
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }

        .menu-card {
            background: linear-gradient(145deg, #0a0f1e, #020617);
            padding: 25px 20px;
            border-radius: 20px;
            border: 2px solid cyan;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
            max-width: 320px;
            width: 90%;
        }

        .title {
            font-size: 28px;
            margin-bottom: 20px;
            color: cyan;
            text-shadow: 0 0 15px cyan;
            font-weight: bold;
            letter-spacing: 2px;
        }

        button {
            padding: 16px 20px;
            margin: 8px 0;
            width: 100%;
            border: none;
            border-radius: 12px;
            background: linear-gradient(145deg, #00ffff, #00cccc);
            color: black;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 0 #008888;
            border: 1px solid rgba(255, 255, 255, 0.3);
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #008888;
            background: linear-gradient(145deg, #00dddd, #00aaaa);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 4px 0 #008888;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .button-group button {
            flex: 1;
        }

        .hidden {
            display: none !important;
        }

        #rankText {
            margin: 20px 0;
            font-size: 18px;
            line-height: 1.8;
            color: #a0f0ff;
            max-height: 300px;
            overflow-y: auto;
        }

        .pause-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: cyan;
            text-shadow: 0 0 20px cyan;
            opacity: 0.8;
            pointer-events: none;
            z-index: 200;
        }

        .direction-hint {
            margin-top: 8px;
            color: #888;
            font-size: 13px;
        }

        .swipe-area {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 10px;
            z-index: 50;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.15);
            border: 2px solid cyan;
            color: cyan;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.1s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .ctrl-btn:active {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(0.95);
        }

        .ctrl-container {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(2, 70px);
            gap: 10px;
            justify-content: center;
        }

        .ctrl-up { grid-column: 2; grid-row: 1; }
        .ctrl-left { grid-column: 1; grid-row: 2; }
        .ctrl-down { grid-column: 2; grid-row: 2; }
        .ctrl-right { grid-column: 3; grid-row: 2; }

        .pause-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 15, 30, 0.98);
            border: 2px solid cyan;
            border-radius: 20px;
            padding: 20px;
            z-index: 300;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
            min-width: 250px;
        }

        .pause-menu h3 {
            color: cyan;
            text-align: center;
            margin: 0 0 20px 0;
            font-size: 24px;
        }

        .pause-menu button {
            margin: 5px 0;
            background: linear-gradient(145deg, #1a2a4a, #0a1a3a);
            color: white;
            box-shadow: 0 4px 0 #0a1a3a;
        }

        @media (max-width: 480px) {
            .title { font-size: 24px; }
            button { font-size: 16px; padding: 14px; }
            h2 { font-size: 18px; }
            .ctrl-btn { width: 60px; height: 60px; font-size: 28px; }
            .ctrl-container { grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px); }
        }

        @media (min-width: 768px) {
            .swipe-area { display: none; }
        }

    border-radius: 40px;

    align-items: center;
    gap: 10px;

    border: 2px solid white;
    border-radius: 50%;
    background: #00ff00;
    padding: 0;
    cursor: pointer;
}

<body>

<div id="gameContainer">
    <h2>🐍 SNAKE ARCADE PRO</h2>
    
    <div class="header-panel">
        <div class="score-box">🍎 <span id="score">0</span></div>
        <div class="difficulty-box">⚡ <span id="difficultyDisplay">Médio</span></div>
    </div>

    <canvas id="game" width="400" height="400"></canvas>
    <div class="direction-hint">← Deslize na tela ou use os botões ↓</div>
</div>

<div id="touchControls" class="swipe-area hidden">
    <div class="ctrl-container">
        <div class="ctrl-btn ctrl-up" data-dir="UP">↑</div>
        <div class="ctrl-btn ctrl-left" data-dir="LEFT">←</div>
        <div class="ctrl-btn ctrl-down" data-dir="DOWN">↓</div>
        <div class="ctrl-btn ctrl-right" data-dir="RIGHT">→</div>
    </div>
</div>

<div id="pauseMenu" class="pause-menu hidden">
    <h3>⏸️ JOGO PAUSADO</h3>
    <button id="resumeBtn">▶️ Continuar</button>
    <button id="pauseMenuBtn">🏠 Menu Principal</button>
    <button id="quitGameBtn">🚪 Sair do Jogo</button>
</div>

<div id="mainMenu" class="screen">
    <div class="menu-card">
        <div class="title">🐍 SNAKE ARCADE</div>
        <button id="newGameBtn">🆕 Novo Jogo</button>
        <button id="continueBtn">▶️ Continuar Jogo</button>
        <button id="rankBtn">🏆 Ranking</button>
    </div>
</div>

<div id="optionsMenu" class="screen hidden">
    <div class="menu-card">
        <div class="title">⚙️ Dificuldade</div>
        <button data-diff="easy">🟢 Fácil</button>
        <button data-diff="medium">🟡 Médio</button>
        <button data-diff="hard">🔴 Difícil</button>
        <button data-diff="impossible">⚫ Impossível</button>
        <button id="backFromOptionsBtn" style="margin-top: 20px;">⬅ Voltar</button>
    </div>
</div>

<div id="rankMenu" class="screen hidden">
    <div class="menu-card">
        <div class="title">🏆 Ranking</div>
        <div id="rankText">Sem registros ainda</div>
        <button id="clearRankBtn" style="background: #ff6b6b; box-shadow: 0 4px 0 #c0392b;">🗑️ Limpar</button>
        <button id="backFromRankBtn">⬅ Voltar</button>
    </div>
</div>

<div id="gameOver" class="screen hidden">
    <div class="menu-card">
        <div class="title">💀 Game Over</div>
        <div style="font-size: 28px; margin: 15px 0;">🍎 <span id="finalScore">0</span></div>
        <div class="button-group">
            <button id="gameOverMenuBtn">🏠 Menu</button>
            <button id="gameOverRestartBtn">🔄 Reiniciar</button>
        </div>
    </div>
</div>

<div id="victoryScreen" class="screen hidden">
    <div class="menu-card">
        <div class="title" style="color: gold; text-shadow: 0 0 20px gold;">🏆 Vitória!</div>
        <div style="font-size: 24px; margin: 15px 0;">Perfeito! 🎉</div>
        <div class="button-group">
            <button id="victoryMenuBtn">🏠 Menu</button>
            <button id="victoryRestartBtn">🔄 Jogar Novamente</button>
        </div>
    </div>
</div>

<script>
(function() {
    "use strict";

    // ==================== CONFIGURAÇÃO ====================
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const box = 20;
    const gridSize = 20;

    // Estado do jogo
    let snake = [];
    let dir = "RIGHT";
    let nextDir = "RIGHT";
    let pendingDir = null;
    let directionLocked = false;
    let food = { x: 15, y: 10 };
    let score = 0;

    // Dificuldade
    let currentDifficulty = "medium";
    let speed = 6;
    let maxSpeed = 14;

    // Controle de loop
    let gameRunning = false;
    let isPaused = false;
    let animFrame = null;
    let lastTime = 0;
    let moveTimer = 0;
    let progress = 0;
    let foodPulse = 0;

    // Salvamento
    let savedGame = null;
    let rank = [];

    // Listener do botão voltar
    let backButtonHandler = null;

    // ==================== POLYFILL ====================
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };
    }

    // ==================== INICIALIZAÇÃO ====================
    function init() {
        loadRank();
        loadSavedGameFromStorage();
        updateContinueButton();
        updateDifficultyDisplay();
        bindEvents();
        backToMenu();
        
        if ('ontouchstart' in window) {
            document.getElementById('touchControls').classList.remove('hidden');
        }

        setupBackButton();
    }

    function setupBackButton() {
        if (backButtonHandler) {
            document.removeEventListener('backbutton', backButtonHandler);
        }
        
        backButtonHandler = function(e) {
            e.preventDefault();
            
            if (!gameRunning) {
                if (!document.getElementById('mainMenu').classList.contains('hidden')) {
                    if (navigator.app && navigator.app.exitApp) {
                        navigator.app.exitApp();
                    } else {
                        window.close();
                    }
                } else {
                    backToMenu();
                }
                return;
            }

            if (!isPaused) {
                togglePause();
            }
            
            document.getElementById('pauseMenu').classList.remove('hidden');
        };

        document.addEventListener('backbutton', backButtonHandler, false);
    }

    function exitGame() {
        savedGame = null;
        persistSavedGame();
        
        if (navigator.vibrate) navigator.vibrate(100);
        
        if (navigator.app && navigator.app.exitApp) {
            navigator.app.exitApp();
        } else {
            window.close();
            if (!window.closed) {
                alert('Para sair, feche a janela do navegador');
            }
        }
    }

    function vibrateFeedback() {
        if (navigator.vibrate) navigator.vibrate(50);
    }

    function loadRank() {
        try {
            const stored = localStorage.getItem("snakeRank_v2");
            rank = stored ? JSON.parse(stored) : [];
        } catch (e) {
            rank = [];
        }
    }

    function saveRank() {
        localStorage.setItem("snakeRank_v2", JSON.stringify(rank));
    }
    
    function loadSavedGameFromStorage() {
        try {
            const saved = localStorage.getItem("snakeSavedGame");
            if (saved) {
                savedGame = JSON.parse(saved);
            } else {
                savedGame = null;
            }
        } catch (e) {
            savedGame = null;
        }
    }
    
    function persistSavedGame() {
        if (savedGame) {
            localStorage.setItem("snakeSavedGame", JSON.stringify(savedGame));
        } else {
            localStorage.removeItem("snakeSavedGame");
        }
        updateContinueButton();
    }

    // ==================== BIND DE EVENTOS ====================
    function bindEvents() {
        document.getElementById('newGameBtn').addEventListener('click', openOptions);
        document.getElementById('continueBtn').addEventListener('click', continueGame);
        document.getElementById('rankBtn').addEventListener('click', openRank);
        
        document.getElementById('resumeBtn').addEventListener('click', () => {
            document.getElementById('pauseMenu').classList.add('hidden');
            togglePause();
        });
        
        document.getElementById('pauseMenuBtn').addEventListener('click', () => {
            document.getElementById('pauseMenu').classList.add('hidden');
            if (isPaused) togglePause();
            stopGame();
            backToMenu();
        });
        
        document.getElementById('quitGameBtn').addEventListener('click', () => {
            if (isPaused) togglePause();
            stopGame();
            exitGame();
        });
        
        document.querySelectorAll('[data-diff]').forEach(btn => {
            btn.addEventListener('click', () => setDifficulty(btn.dataset.diff));
        });
        document.getElementById('backFromOptionsBtn').addEventListener('click', backToMenu);
        
        document.getElementById('clearRankBtn').addEventListener('click', clearRank);
        document.getElementById('backFromRankBtn').addEventListener('click', backToMenu);
        
        document.getElementById('gameOverMenuBtn').addEventListener('click', backToMenu);
        document.getElementById('gameOverRestartBtn').addEventListener('click', restartAfterGameOver);
        
        document.getElementById('victoryMenuBtn').addEventListener('click', backToMenu);
        document.getElementById('victoryRestartBtn').addEventListener('click', restartAfterVictory);
        
        document.querySelectorAll('.ctrl-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const newDir = btn.dataset.dir;
                if (!gameRunning || isPaused) return;
                setDirection(newDir);
                vibrateFeedback();
            }, { passive: false });
        });
        
        document.addEventListener("keydown", e => {
            const key = e.key;
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " ", "Escape"].includes(key)) {
                e.preventDefault();
            }
            if (key === "Escape" || key === " ") {
                if (gameRunning) {
                    togglePause();
                    if (isPaused) {
                        document.getElementById('pauseMenu').classList.remove('hidden');
                    } else {
                        document.getElementById('pauseMenu').classList.add('hidden');
                    }
                }
                return;
            }
            if (!gameRunning || isPaused) return;
            
            let newDir = null;
            if (key === "ArrowUp") newDir = "UP";
            else if (key === "ArrowDown") newDir = "DOWN";
            else if (key === "ArrowLeft") newDir = "LEFT";
            else if (key === "ArrowRight") newDir = "RIGHT";
            
            if (newDir) setDirection(newDir);
        });
        
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener("touchstart", e => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }, { passive: false });
        
        canvas.addEventListener("touchmove", e => e.preventDefault(), { passive: false });
        
        canvas.addEventListener("touchend", e => {
            e.preventDefault();
            if (!gameRunning || isPaused || !touchStartX) return;
            
            const touch = e.changedTouches[0];
            if (!touch) return;
            
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            const minDist = 10;
            
            if (Math.abs(dx) < minDist && Math.abs(dy) < minDist) return;
            
            let newDir = null;
            if (Math.abs(dx) > Math.abs(dy)) {
                newDir = dx > 0 ? "RIGHT" : "LEFT";
            } else {
                newDir = dy > 0 ? "DOWN" : "UP";
            }
            
            if (newDir) setDirection(newDir);
            
            touchStartX = 0;
            touchStartY = 0;
        }, { passive: false });
    }

    function setDirection(desiredDir) {
        if (!gameRunning || isPaused || directionLocked) return;
        
        const opposites = { "UP": "DOWN", "DOWN": "UP", "LEFT": "RIGHT", "RIGHT": "LEFT" };
        if (opposites[desiredDir] !== dir) {
            pendingDir = desiredDir;
            directionLocked = true;
        }
    }

    // ==================== MENUS ====================
    function openOptions() {
        hideAllMenus();
        document.getElementById("optionsMenu").classList.remove("hidden");
    }

    function openRank() {
        hideAllMenus();
        document.getElementById("rankMenu").classList.remove("hidden");
        updateRankDisplay();
    }

    function backToMenu() {
        if (gameRunning && snake.length > 0) {
            savedGame = {
                snake: snake.map(s => ({ ...s })),
                dir: dir,
                food: { ...food },
                score: score,
                difficulty: currentDifficulty,
                speed: speed,
                maxSpeed: maxSpeed
            };
            persistSavedGame();
        }
        
        stopGame();
        hideAllMenus();
        document.getElementById('pauseMenu').classList.add('hidden');
        document.getElementById("mainMenu").classList.remove("hidden");
        document.getElementById("touchControls").classList.add("hidden");
    }

    function hideAllMenus() {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    }

    function updateContinueButton() {
        const btn = document.getElementById("continueBtn");
        const hasSave = !!savedGame;
        if (btn) {
            btn.disabled = !hasSave;
            btn.style.opacity = hasSave ? "1" : "0.5";
        }
    }

    function updateDifficultyDisplay() {
        const names = { easy: "Fácil", medium: "Médio", hard: "Difícil", impossible: "Impossível" };
        document.getElementById("difficultyDisplay").textContent = names[currentDifficulty] || "Médio";
    }

    // ==================== DIFICULDADE ====================
    function setDifficulty(level) {
        currentDifficulty = level;
        const settings = {
            easy: { speed: 4, maxSpeed: 10 },
            medium: { speed: 6, maxSpeed: 14 },
            hard: { speed: 9, maxSpeed: 18 },
            impossible: { speed: 12, maxSpeed: 25 }
        };
        speed = settings[level].speed;
        maxSpeed = settings[level].maxSpeed;
        updateDifficultyDisplay();
        hideAllMenus();
        startNewGameSession();
    }

    // ==================== JOGO ====================
    function startNewGameSession() {
        stopLoop();
        snake = [{ x: 10, y: 10 }];
        dir = "RIGHT";
        nextDir = "RIGHT";
        pendingDir = null;
        directionLocked = false;
        score = 0;
        
        food = spawnFood();
        if (!food) food = { x: 15, y: 10 };
        
        updateScore();
        gameRunning = true;
        isPaused = false;
        lastTime = performance.now();
        moveTimer = 0;
        progress = 0;
        
        savedGame = null;
        persistSavedGame();
        
        document.getElementById('pauseMenu').classList.add('hidden');
        document.getElementById("touchControls").classList.remove("hidden");
        draw();
        startLoop();
    }

    function continueGame() {
        if (!savedGame) {
            startNewGameSession();
            return;
        }
        stopLoop();
        snake = savedGame.snake.map(s => ({ ...s }));
        dir = savedGame.dir;
        nextDir = savedGame.dir;
        pendingDir = null;
        directionLocked = false;
        food = { ...savedGame.food };
        score = savedGame.score;
        currentDifficulty = savedGame.difficulty;
        speed = savedGame.speed;
        maxSpeed = savedGame.maxSpeed;
        
        updateScore();
        updateDifficultyDisplay();
        hideAllMenus();
        gameRunning = true;
        isPaused = false;
        lastTime = performance.now();
        moveTimer = 0;
        progress = 0;
        
        document.getElementById('pauseMenu').classList.add('hidden');
        document.getElementById("touchControls").classList.remove("hidden");
        draw();
        startLoop();
    }

    function restartAfterGameOver() {
        hideAllMenus();
        startNewGameSession();
    }
    
    function restartAfterVictory() { 
        hideAllMenus();
        startNewGameSession(); 
    }

    function spawnFood() {
        if (!snake || snake.length === 0) return { x: 15, y: 10 };
        if (snake.length >= gridSize * gridSize) {
            victory();
            return null;
        }
        
        const freeCells = [];
        const snakeSet = new Set(snake.map(s => `${s.x},${s.y}`));
        for (let x = 0; x < gridSize; x++) {
            for (let y = 0; y < gridSize; y++) {
                if (!snakeSet.has(`${x},${y}`)) {
                    freeCells.push({ x, y });
                }
            }
        }
        
        if (freeCells.length === 0) {
            victory();
            return null;
        }
        return freeCells[Math.floor(Math.random() * freeCells.length)];
    }

    // ==================== UPDATE GAME CORRIGIDO ====================
    function updateGame() {
        if (!gameRunning || isPaused) return;
        
        if (pendingDir) {
            const opposites = { "UP": "DOWN", "DOWN": "UP", "LEFT": "RIGHT", "RIGHT": "LEFT" };
            if (opposites[pendingDir] !== dir) {
                nextDir = pendingDir;
            }
            pendingDir = null;
        }
        directionLocked = false;
        
        dir = nextDir;
        const head = { ...snake[0] };
        
        switch (dir) {
            case "UP": head.y--; break;
            case "DOWN": head.y++; break;
            case "LEFT": head.x--; break;
            case "RIGHT": head.x++; break;
        }
        
        const willEat = (head.x === food.x && head.y === food.y);
        
        if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
            gameOver();
            return;
        }
        
        // CORREÇÃO DA COLISÃO
        let collision = false;
        if (willEat) {
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    collision = true;
                    break;
                }
            }
        } else {
            for (let i = 0; i < snake.length - 1; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    collision = true;
                    break;
                }
            }
        }
        
        if (collision) {
            gameOver();
            return;
        }
        
        snake.unshift(head);
        
        if (willEat) {
            score++;
            updateScore();
            vibrateFeedback();
            
            const newFood = spawnFood();
            if (!newFood) {
                victory();
                return;
            }
            food = newFood;
            
            if (speed < maxSpeed) {
                speed = Math.min(speed + 0.3, maxSpeed);
            }
        } else {
            snake.pop();
        }
    }

    function draw() {
        ctx.clearRect(0, 0, 400, 400);
        ctx.fillStyle = "#020617";
        ctx.fillRect(0, 0, 400, 400);
        
        ctx.strokeStyle = "#0a1030";
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= gridSize; i++) {
            ctx.beginPath();
            ctx.moveTo(i * box, 0);
            ctx.lineTo(i * box, 400);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * box);
            ctx.lineTo(400, i * box);
            ctx.stroke();
        }
        
        if (food) {
            const pulse = Math.sin(foodPulse) * 0.1 + 1;
            ctx.fillStyle = "#ff4444";
            ctx.shadowColor = "#ff0000";
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(food.x * box + box/2, food.y * box + box/2, (box/2 - 2) * pulse, 0, Math.PI * 2);
            ctx.fill();
        }
        
        ctx.shadowBlur = 0;
        
        snake.forEach((segment, i) => {
            const isHead = i === 0;
            let x = segment.x, y = segment.y;
            
            if (!isPaused && gameRunning && i < snake.length - 1) {
                const prev = snake[i + 1];
                x = segment.x + (prev.x - segment.x) * (1 - progress);
                y = segment.y + (prev.y - segment.y) * (1 - progress);
            }
            
            const gradient = ctx.createRadialGradient(x*box+5, y*box+5, 2, x*box+10, y*box+10, 12);
            if (isHead) {
                gradient.addColorStop(0, "#80ff80");
                gradient.addColorStop(1, "#00cc00");
            } else {
                gradient.addColorStop(0, "#00aa00");
                gradient.addColorStop(1, "#006600");
            }
            
            const picker = document.getElementById('snakeColorPicker');
ctx.fillStyle = picker ? picker.value : gradient;
            ctx.shadowColor = isHead ? "#00ff00" : "#008800";
            ctx.shadowBlur = isHead ? 12 : 6;
            ctx.beginPath();
            ctx.roundRect(x * box + 1, y * box + 1, box - 2, box - 2, 4);
            ctx.fill();
            
            if (isHead) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = "white";
                const eyeSize = 3;
                if (dir === "RIGHT") {
                    ctx.fillRect(x*box+13, y*box+5, eyeSize, eyeSize);
                    ctx.fillRect(x*box+13, y*box+12, eyeSize, eyeSize);
                } else if (dir === "LEFT") {
                    ctx.fillRect(x*box+4, y*box+5, eyeSize, eyeSize);
                    ctx.fillRect(x*box+4, y*box+12, eyeSize, eyeSize);
                } else if (dir === "UP") {
                    ctx.fillRect(x*box+5, y*box+4, eyeSize, eyeSize);
                    ctx.fillRect(x*box+12, y*box+4, eyeSize, eyeSize);
                } else {
                    ctx.fillRect(x*box+5, y*box+13, eyeSize, eyeSize);
                    ctx.fillRect(x*box+12, y*box+13, eyeSize, eyeSize);
                }
            }
        });
        ctx.shadowBlur = 0;
    }

    // ==================== LOOP ====================
    function startLoop() {
        if (animFrame) cancelAnimationFrame(animFrame);
        animFrame = requestAnimationFrame(gameLoop);
    }

    function stopLoop() {
        if (animFrame) {
            cancelAnimationFrame(animFrame);
            animFrame = null;
        }
    }

    function gameLoop(time) {
        if (!gameRunning) {
            animFrame = null;
            return;
        }
        
        if (!isPaused) {
            let delta = time - lastTime;
            delta = Math.min(delta, 100);
            lastTime = time;
            moveTimer += delta;
            foodPulse += delta * 0.01;
            
            const interval = 1000 / speed;
            progress = Math.min(moveTimer / interval, 1);
            
            if (moveTimer >= interval) {
                updateGame();
                moveTimer = 0;
                progress = 0;
            }
        }
        
        draw();
        animFrame = requestAnimationFrame(gameLoop);
    }

    function stopGame() {
        gameRunning = false;
        isPaused = false;
        document.getElementById('pauseMenu').classList.add('hidden');
        stopLoop();
    }

    function togglePause() {
        if (!gameRunning) return;
        isPaused = !isPaused;
        if (!isPaused) {
            lastTime = performance.now();
        }
        draw();
    }

    // ==================== FIM DE JOGO ====================
    function gameOver() {
        gameRunning = false;
        stopLoop();
        
        if (navigator.vibrate) navigator.vibrate(200);
        
        document.getElementById('pauseMenu').classList.add('hidden');
        document.getElementById("touchControls").classList.add("hidden");
        
        savedGame = null;
        persistSavedGame();
        
        if (score > 0) {
            rank.push(score);
            rank.sort((a, b) => b - a);
            rank = rank.slice(0, 10);
            saveRank();
        }
        
        document.getElementById("finalScore").textContent = score;
        document.getElementById("gameOver").classList.remove("hidden");
    }

    function victory() {
        gameRunning = false;
        stopLoop();
        
        if (navigator.vibrate) navigator.vibrate([100, 100, 100]);
        
        document.getElementById('pauseMenu').classList.add('hidden');
        document.getElementById("touchControls").classList.add("hidden");
        
        savedGame = null;
        persistSavedGame();
        
        if (score > 0) {
            rank.push(score);
            rank.sort((a, b) => b - a);
            rank = rank.slice(0, 10);
            saveRank();
        }
        
        document.getElementById("victoryScreen").classList.remove("hidden");
    }

    // ==================== RANKING ====================
    function updateRankDisplay() {
        const rankText = document.getElementById("rankText");
        if (rank.length === 0) {
            rankText.innerHTML = "Sem registros ainda";
            return;
        }
        let html = "";
        rank.slice(0, 10).forEach((s, i) => {
            const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i+1}º`;
            html += `<div>${medal} ${s} pontos</div>`;
        });
        rankText.innerHTML = html;
    }

    function clearRank() {
        if (confirm("Limpar ranking?")) {
            rank = [];
            saveRank();
            updateRankDisplay();
        }
    }

    function updateScore() {
        document.getElementById("score").textContent = score;
    }

    init();
})();
</script>
